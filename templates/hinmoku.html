<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>品目マスタ</title>
</head>
<body>
    <div style="text-align:right;">
        ログインユーザ：{{ session["user_name"] }}
    </div>

    <h1>品目マスタ</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <h2>新規登録</h2>
    <form method="post">
        <div>
            <label>品目コード</label>
            <input type="number" name="hinmoku_cd" required>
        </div>
        <div>
            <label>品目名</label>
            <input type="text" name="hinmoku_name" required>
        </div>
        <div>
            <label>現在数量</label>
            <input type="number" step="0.01" name="now_count" required>
        </div>
        <div>
            <label>単位</label>
            <input type="text" name="tani" required>
        </div>
        <div>
            <label>発注点</label>
            <input type="number" step="0.01" name="alert_count" required>
        </div>
        <div>
            <button type="submit">登録</button>
        </div>
    </form>

    <h2>一覧</h2>
    <table border="1">
        <tr>
            <th>品目コード</th>
            <th>品目名</th>
            <th>現在数量</th>
            <th>単位</th>
            <th>発注点</th>
            <th>操作</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.hinmoku_cd }}</td>
            <td>{{ item.hinmoku_name }}</td>
            <td>{{ item.now_count }}</td>
            <td>{{ item.tani }}</td>
            <td>{{ item.alert_count }}</td>
            <td>
                <a href="{{ url_for('hinmoku_edit', hinmoku_cd=item.hinmoku_cd) }}">編集</a>

                <form method="post"
                      action="{{ url_for('hinmoku_delete', hinmoku_cd=item.hinmoku_cd) }}"
                      style="display:inline;"
                      onsubmit="return confirm('削除しますか？');">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="{{ url_for('menu') }}">メニューへ戻る</a>
</body>
</html>
