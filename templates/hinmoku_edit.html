{% extends "base.html" %}

{% block title %}品目編集{% endblock %}

{% block content %}

<div class="page-header">
<h1 class="page-title">品目編集</h1>

<a class="btn btn-primary btn-sm"
href="{{ url_for('hinmoku_list') }}">
品目マスタへ戻る
</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">

<form method="post">

<div class="form-grid">

<label>品目コード</label>
<input type="number" name="hinmoku_cd"
value="{{ item.hinmoku_cd }}" readonly>

<label>品目名</label>
<input type="text" name="hinmoku_name"
value="{{ item.hinmoku_name }}" required>

<label>現在数量</label>
<input type="number" step="0.01"
name="now_count"
value="{{ item.now_count }}" required>

<label>単位</label>
<input type="text"
name="tani"
value="{{ item.tani }}" required>

<label>発注点</label>
<input type="number" step="0.01"
name="alert_count"
value="{{ item.alert_count }}" required>

</div>

<div class="form-actions">
<button class="btn btn-success">更新</button>
</div>

</form>

</div>

{% endblock %}
