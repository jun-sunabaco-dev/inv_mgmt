<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>品目編集</title>
</head>
<body>
    <div style="text-align:right;">
        ログインユーザ：{{ session["user_name"] }}
    </div>

    <h1>品目編集</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <div>
            <label>品目コード</label>
            <input type="number" name="hinmoku_cd" value="{{ item.hinmoku_cd }}" readonly>
        </div>
        <div>
            <label>品目名</label>
            <input type="text" name="hinmoku_name" value="{{ item.hinmoku_name }}" required>
        </div>
        <div>
            <label>現在数量</label>
            <input type="number" step="0.01" name="now_count" value="{{ item.now_count }}" required>
        </div>
        <div>
            <label>単位</label>
            <input type="text" name="tani" value="{{ item.tani }}" required>
        </div>
        <div>
            <label>発注点</label>
            <input type="number" step="0.01" name="alert_count" value="{{ item.alert_count }}" required>
        </div>
        <div>
            <button type="submit">更新</button>
        </div>
    </form>

    <br>
    <a href="{{ url_for('hinmoku_list') }}">品目マスタへ戻る</a>
</body>
</html>
