{% extends "base.html" %}

{% block title %}入出庫編集{% endblock %}

{% block content %}

<div class="page-header">

<h1 class="page-title">入出庫編集</h1>

<a class="btn btn-primary btn-sm"
href="{{ url_for('inout_input') }}">
入出庫入力へ戻る
</a>

</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">

<form method="post">

<div class="form-grid">

<label>伝票NO</label>
<input type="number"
name="den_no"
value="{{ item.den_no }}"
readonly>

<label>品目コード</label>
<input type="number"
name="hinmoku_cd"
value="{{ item.hinmoku_cd }}"
readonly>

<label>品目名</label>
<input type="text"
value="{{ item.hinmoku.hinmoku_name }}"
readonly>

<label>入出庫区分</label>

<select name="inout_kbn">

<option value="1"
{% if item.inout_kbn == 1 %}selected{% endif %}>
入庫
</option>

<option value="2"
{% if item.inout_kbn == 2 %}selected{% endif %}>
出庫
</option>

<option value="3"
{% if item.inout_kbn == 3 %}selected{% endif %}>
調整
</option>

</select>

<label>数量</label>
<input type="number"
step="0.01"
name="count"
value="{{ item.count }}"
required>

</div>

<div class="form-actions">
<button class="btn btn-success">更新</button>
</div>

</form>

</div>

{% endblock %}
