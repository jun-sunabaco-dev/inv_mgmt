<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>入出庫編集</title>
</head>
<body>
    <div style="text-align:right;">
        ログインユーザ：{{ session["user_name"] }}
    </div>

    <h1>入出庫編集</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <div>
            <label>伝票NO</label>
            <input type="number" name="den_no" value="{{ item.den_no }}" required>
        </div>
        <div>
            <label>品目コード</label>
            <input type="number" name="hinmoku_cd" value="{{ item.hinmoku_cd }}" readonly>
        </div>
        <div>
            <label>品目名</label>
            <input type="number" name="hinmoku_cd" value="{{ item.hinmoku_name }}" readonly>
        </div>

        <div>
            <label>入出庫区分</label>
            <input type="number" name="inout_kbn" value="{{ item.inout_kbn }}" required>
        </div>
        <div>
            <label>数量</label>
            <input type="number" step="0.01" name="count" value="{{ item.count }}" required>
        </div>
        <div>
            <button type="submit">更新</button>
        </div>
    </form>

    <br>
    <a href="{{ url_for('inout_input') }}">入出庫入力へ戻る</a>
</body>
</html>
