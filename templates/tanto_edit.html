{% extends "base.html" %}

{% block title %}担当編集{% endblock %}

{% block content %}

<div class="page-header">
<h1 class="page-title">担当編集</h1>

<a class="btn btn-primary btn-sm"
href="{{ url_for('tanto_list') }}">
担当マスタへ戻る
</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">

<form method="post">

<div class="form-grid">

<label>ユーザID</label>
<input type="number"
name="user_id"
value="{{ item.user_id }}"
readonly>

<label>ユーザ名</label>
<input type="text"
name="user_name"
value="{{ item.user_name }}"
required>

<label>パスワード</label>
<input type="password"
name="password"
placeholder="変更する場合のみ入力">

<label>権限</label>

<select name="authority">

<option value="1"
{% if item.authority == 1 %}selected{% endif %}>
管理者
</option>

<option value="2"
{% if item.authority == 2 %}selected{% endif %}>
一般
</option>

</select>

</div>

<div class="form-actions">
<button class="btn btn-success">更新</button>
</div>

</form>

</div>

{% endblock %}
